<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notella — Flashcard Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../static/css/main.css"/>
  <link rel="stylesheet" href="../../static/css/dashboard.css"/>
  <link rel="stylesheet" href="../../static/css/editor.css"/>
  <link rel="stylesheet" href="../../static/css/flashcard_editor.css"/>
</head>
<body class="dashboard-body">

  <nav class="sidebar">
    <a href="index.html" class="nav-icon active">
      <i class="bi bi-house" style="font-size: 20px;"></i>
    </a>
    <div class="sidebar-divider"></div> 
    <a href="../info.html" class="nav-icon">
      <i class="bi bi-info" style="font-size: 25px;"></i>
    </a>
    <div class="sidebar-divider"></div>
    <a href="../discover/index.html" class="nav-icon">
      <i class="bi bi-search" style="font-size: 18px;"></i>
    </a>
    <div class="sidebar-divider"></div>
    <a href="../profile.html" class="nav-icon">
      <i class="bi bi-person" style="font-size: 22px;"></i>
    </a>
    <div class="sidebar-divider"></div>
    <a href="../auth/login.html" class="nav-icon">
      <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
    </a>
  </nav>

<div class="dash-main">
    <div class="dash-container">

        <!--Header-->
        <div class="editor-header">
            <div class="editor-header-left">
                <div class="dash-greeting">
                    <a href="index.html" class="back-btn">
                        <i class="bi bi-arrow-left"></i>
                        Flashcard editor
                    </a> 
                </div>
                <div class="dash-title editor-title" contenteditable="true" spellcheck="false" id="decks-title">
                    Decks Name
                </div>
            </div>
            <div class="editor-header-right">
                <button class="btn-add" id="add-card" title="Add card">+</button>
                <button class="btn-save" id="btn-save" onclick="saveDeck()">Save</button>
            </div>
        </div>

        <div class="dash-divider"></div>

        <!--Main layout-->
        <div class="editor-layout">
            
            <!--card viewer-->
            <div style="flex:1; display:flex; flex-direction:column;">
                <div class="viewer">
                    <button class="fc-nav-btn" id="btn-prev">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <div class="fc-card" id="card">
                        <div class="fc-inner" id="inner">
                            <div class="fc-front">
                                <p class="fc-label">FRONT</p>
                                <div class="fc-text" contenteditable="true" spellcheck="false" id="front-text">Click to edit front</div>
                            </div>
                            <div class="fc-back">
                                <p class="fc-label">BACK</p>
                                <div class="fc-text" contenteditable="true" spellcheck="false" id="back-text">Click to edit back</div>
                            </div>
                        </div>
                    </div>
                    <button class="fc-nav-btn" id="btn-next">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
                <div class="fc-counter" id="counter">Card 1 of 1</div>
                <div style="display:flex; justify-content:center; margin-top:7px;">
                    <button class="flip-btn" onclick="flipCard()">
                        <i class="bi bi-arrow-repeat"></i> Flip card
                    </button>
                </div>
                <div style="display:flex; justify-content:center; margin-top:7px;">
                    <button class="btn-danger" id="btn-delete" style="width:auto; padding:8px 20px;">
                        <i class="bi bi-trash"></i> Delete card
                    </button>
                </div>
            </div>

            <!--side panel-->
            <div class="editor-side">
                <div class="editor-side-card">
                    <div class="editor-side-label">Visibility</div>
                    <div class="vis-toggle">
                        <button class="vis-btn active" id="vis-private" onclick="setVis('private')">Private</button>
                        <div class="vis-divider"></div>
                        <button class="vis-btn" id="vis-public" onclick="setVis('public')">Public</button>
                    </div>
                </div>
                <div class="editor-side-card">
                    <div class="editor-side-label">Description:</div>
                    <textarea class="side-textarea" placeholder="Add a short description..." id="note-description"></textarea>
                </div>
                <div class="editor-side-card">
                    <div class="editor-side-label">Tags:</div>
                    <div class="tags-wrap" id="tags-wrap" onclick="document.getElementById('tag-input').focus()">
                        <span class="note-tag tag-removable">CITS3000 <button class="tag-remove" onclick="removeTag(this)">×</button></span>
                        <span class="note-tag tag-removable">week-2 <button class="tag-remove" onclick="removeTag(this)">×</button></span>
                        <input class="tag-input" id="tag-input" placeholder="Add tag..." onkeydown="handleTag(event)" maxlength="20"/>
                    </div>
                </div>
                <div class="editor-side-card">
                    <div class="editor-side-label">Danger Zone:</div>
                    <button class="btn-danger">
                        <i class="bi bi-trash"></i> Delete Deck
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../../static/js/flashcard_editor.js"></script>
</body>
</html>
