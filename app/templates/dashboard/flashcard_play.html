<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notella — Flashcard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../static/css/main.css"/>
  <link rel="stylesheet" href="../../static/css/dashboard.css"/>
  <link rel="stylesheet" href="../../static/css/editor.css"/>
  <link rel="stylesheet" href="../../static/css/flashcard.css"/>
  <link rel="stylesheet" href="../../static/css/flashcard_editor.css"/>
</head>
<body class="dashboard-body">

  <nav class="sidebar">
    <a href="index.html" class="nav-icon active">
      <i class="bi bi-house" style="font-size: 20px;"></i>
    </a>
    <div class="sidebar-divider"></div> 
    <a href="../info.html" class="nav-icon">
      <i class="bi bi-info" style="font-size: 25px;"></i>
    </a>
    <div class="sidebar-divider"></div>
    <a href="../discover/index.html" class="nav-icon">
      <i class="bi bi-search" style="font-size: 18px;"></i>
    </a>
    <div class="sidebar-divider"></div>
    <a href="../profile.html" class="nav-icon">
      <i class="bi bi-person" style="font-size: 22px;"></i>
    </a>
    <div class="sidebar-divider"></div>
    <a href="../auth/login.html" class="nav-icon">
      <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
    </a>
  </nav>

<div class="dash-main">
    <div class="dash-container">

        <!--Header-->
        <div class="editor-header">
            <div class="editor-header-left">
                <div class="dash-greeting">
                    <a href="index.html" class="back-btn">
                        <i class="bi bi-arrow-left"></i>
                        Flashcard
                    </a> 
                </div>
                <div class="dash-title editor-title" contenteditable="true" spellcheck="false" id="decks-title">
                    Decks Name
                </div>
            </div>

            <!--Progress Information-->
            <div class="editor-header-center">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                <span class="progress-label" id="progress-label"> 0/0</span>
            </div>
            
            <div class="editor-header-right">
                <button class="btn-save" id="btn-save" onclick="saveDeck()">Save</button>
            </div>
        </div>

        <div class="dash-divider"></div>

        <!--Main layout-->
        <div class="editor-layout" id="card-viewer">
            <!--card viewer-->
            <div style="flex:1; display:flex; flex-direction:column;">
                <div class="viewer">
                    <div class="fc-card" id="card">
                        <div class="fc-inner" id="inner" onclick="flipCard()">
                            <div class="fc-front">
                                <p class="fc-label">FRONT</p>
                                <div class="fc-text" id="front-text">Pallor Mortis</div>
                            </div>
                            <div class="fc-back">
                                <p class="fc-label">BACK</p>
                                <div class="fc-text" id="back-text">Paleness of death</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="fc-counter" id="counter">Card 1 of 1</div>
                <div style="display:flex; justify-content:center; margin-top:7px;">
                    <button class="flip-btn" id="btn-correct" style="width:auto; padding:8px 20px;">
                        <i class="bi bi-check-circle-fill"></i> Correct
                    </button>
                </div>
                <div style="display:flex; justify-content:center; margin-top:7px;">
                    <button class="btn-danger" id="btn-wrong" style="width:auto; padding:8px 20px;">
                        <i class="bi bi-x-circle-fill"></i> Wrong
                    </button>
                </div>
            </div>
        </div>
        <!--Result page-->
        <div id="result-page" style="display:none; padding:40px; margin:0 auto; max-width:800px; overflow-y: auto; scrollbar-width: none;">
            <!--General info about their results-->
            <div style="text-align:center; margin-bottom:20px;">
                <h2>Session Completed</h2>
                <p id="results-percentage"></p>
                <p id="results-correct"></p>
                <p id="results-wrong"></p>
            </div>

            <!--Showing the correct cards-->
            <div style="text-align: left; margin-top: 20px;">
                <p style="color: var(--btn-green-color);">
                    <i class="bi bi-check"></i> Correct cards :
                </p>
                <div id="correct-list"></div>
            </div>

            <!--Showing the incorrect cards-->
            <div style="text-align: left; margin-top: 20px;">
                <p style="color: var(--btn-danger-color);">
                    <i class="bi bi-x"></i> Wrong cards :
                </p>
                <div id="wrong-list"></div>
            </div>

            <!--Buttons-->
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 10px;">
                <button class="btn-retry" onclick="restartDeck()">Try Again</button>
                <button class="btn-retry" onclick="window.location.href='flashcard_editor.html'">Edit Deck</button>
            </div>
        </div>
    </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../../static/js/flashcard_play.js"></script>
</body>
</html>
