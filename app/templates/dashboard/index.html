<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notella — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../static/css/main.css"/>
  <link rel="stylesheet" href="../../static/css/dashboard.css"/>
  <link rel="stylesheet" href="../../static/css/discover.css"/>
</head>
<body class="dashboard-body">

  <!-- Sidebar -->
    <nav class="sidebar">
        <a href="index.html" class="nav-icon active">
            <i class="bi bi-house" style="font-size: 20px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="../info.html" class="nav-icon">
            <i class="bi bi-info" style="font-size: 25px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="../discover/index.html" class="nav-icon">
            <i class="bi bi-search" style="font-size: 18px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="../profile.html" class="nav-icon">
            <i class="bi bi-person" style="font-size: 22px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="../auth/login.html" class="nav-icon">
            <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
        </a>
    </nav>

  <!-- Main -->
    <div class="dash-main">
        <div class="dash-container">

        <!-- Header -->
            <div class="dash-greeting">Good morning, User</div>
            <div class="dash-title">Your Dashboard</div>

            <!-- Controls -->
            <div class="dash-controls">
                <div class="tab-toggle">
                    <button class="tab-btn active" onclick="switchTab('notes', this)">Notes</button>
                    <div class="tab-divider"></div>
                    <button class="tab-btn" onclick="switchTab('decks', this)">Flashcard Decks</button>
                </div>
                <div class="search-row">
                    <input class="search-input" type="text" placeholder="Search..."/>
                    <!--sort dropdown-->
                    <div class="select" id="sort-wrapper">
                        <button class="select-btn" id="sort-btn">
                            Alphabetical <i class="bi bi-chevron-down" style="font-size: 11px;"></i>
                        </button>
                        <div class="select-dropdown" id="sort-dropdown">
                            <div class="select-option active" data-value="alpha">Alphabetical</div>
                            <div class="select-option" data-value="date">Last Updates</div>
                        </div>
                    </div>
                    <button class="btn-add">+</button>
                </div>
            </div>
            <div class="dash-divider"></div>

            <div id="panel-notes">
                <div class="notes-grid" id="notes-grid"></div>
            </div>

            <div id="panel-decks" style="display:none;">
                <div class="notes-grid" id="decks-grid"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../static/js/dashboard.js"></script>
   

</body>
</html>
