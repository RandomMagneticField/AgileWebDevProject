<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notetella — Active Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../../static/css/main.css"/>
    <link rel="stylesheet" href="../../static/css/dashboard.css"/>
    <link rel="stylesheet" href="../../static/css/editor.css"/>
    <style>
        .quiz-active-layout {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .quiz-active-placeholder {
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow-y: auto;
            padding: 0 8px 0;
            scroll-behavior: smooth;
        }

        .quiz-active-placeholder::-webkit-scrollbar {
            width: 3px;
        }

        .quiz-active-placeholder::-webkit-scrollbar-track {
            background: transparent;
        }

        .quiz-active-placeholder::-webkit-scrollbar-thumb {
            background: var(--sidebar-divider);
            border-radius: 2px;
        }

        .quiz-active-placeholder::-webkit-scrollbar-thumb:hover {
            background: var(--editor-box-border);
        }

        .quiz-active-placeholder {
            scrollbar-width: thin;
            scrollbar-color: var(--sidebar-divider) transparent;
        }

        .quiz-active-side {
            width: 220px;
            flex-shrink: 0;
            height: 100%;
            min-height: 0;
            display: flex;
        }

        .quiz-question-list-card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .quiz-question-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 4px 10px 0;
            overflow-y: auto;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--sidebar-divider) transparent;
        }

        .quiz-question-list::-webkit-scrollbar {
            width: 3px;
        }

        .quiz-question-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .quiz-question-list::-webkit-scrollbar-thumb {
            background: var(--sidebar-divider);
            border-radius: 2px;
        }

        .quiz-question-list::-webkit-scrollbar-thumb:hover {
            background: var(--editor-box-border);
        }

        .quiz-question-item {
            display: block;
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 10px 10px;
            background: rgba(74, 74, 74, 0.22);
            color: rgba(220, 220, 220, 0.82);
            font-family: inherit;
            font-size: 11px;
            font-weight: 400;
            line-height: 1.35;
            text-align: left;
            text-decoration: none;
            transition: background 0.15s ease, color 0.15s ease;
            cursor: pointer;
        }

        .quiz-question-item:hover {
            background: rgba(82, 82, 82, 0.34);
            color: var(--text-primary);
        }

        .quiz-question-item.is-completed {
            background: rgba(38, 72, 170, 0.36);
            color: var(--btn-blue-color);
        }

        .quiz-question-item.is-completed:hover {
            background: rgba(38, 72, 170, 0.48);
            color: var(--btn-blue-color);
        }

        .quiz-question-item:focus-visible {
            outline: 2px solid var(--btn-blue-border);
            outline-offset: 2px;
        }

        .quiz-empty-panel {
            width: min(100%, 900px);
            margin: 0 auto;
            background: var(--note-card-bg);
            border: 1px solid var(--note-card-border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .quiz-mcq-panel {
            width: min(100%, 900px);
            margin: 0 auto;
            background: var(--side-card-bg);
            border: 1px solid var(--editor-box-border);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-mcq-panel:not(:last-child) {
            margin-bottom: 12px;
        }

        .quiz-mcq-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .quiz-mcq-box {
            width: 100%;
            min-height: 56px;
            border-radius: 10px;
            padding: 10px 12px 10px 12px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            transition: background 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            gap: 14px;
            overflow: visible;
        }

        .quiz-option-letter {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            margin-left: 0;
            margin-right: 0;
            line-height: 1;
            margin-top: 0;
            margin-bottom: 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--note-title);
        }

        .quiz-option-text {
            flex: 1;
            min-width: 0;
            margin: 0;
            display: block;
            line-height: 1.35;
            white-space: normal;
            overflow-wrap: anywhere;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            text-align: left;
            line-height: 1.35;
        }

        .quiz-mcq-box:hover {
            background: var(--nav-active-bg);
            border-color: var(--editor-box-border);
        }

        .quiz-mcq-box.quiz-option-selected {
            background: var(--btn-blue-bg);
            border-color: var(--btn-blue-border);
        }

        .quiz-mcq-box.quiz-option-selected:hover {
            background: var(--btn-blue-bg-hover);
            border-color: var(--btn-blue-border);
        }

        .quiz-mcq-box.quiz-option-selected .quiz-option-letter {
            background: rgba(111, 147, 255, 0.14);
            border-color: var(--btn-blue-border);
            color: var(--btn-blue-color);
        }

        .quiz-mcq-box.quiz-option-selected .quiz-option-text {
            color: var(--btn-blue-color);
        }

        .quiz-question-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 0 0;
            padding: 0 4px;
        }

        .quiz-question-prompt {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: var(--note-title);
            margin: 0 0 0 0;
            padding: 0 4px;
            white-space: normal;
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body class="dashboard-body">
    <!-- Sidebar -->
    <nav class="sidebar">
        <a href="dashboard/index.html"class="nav-icon" >
            <i class="bi bi-house" style="font-size: 20px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="info.html" class="nav-icon">
            <i class="bi bi-info" style="font-size: 25px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="discover/index.html" class="nav-icon">
            <i class="bi bi-search" style="font-size: 18px;"></i>
        </a>
        <div class="sidebar-divider" ></div>
        <a href="profile.html" class="nav-icon active">
            <i class="bi bi-person" style="font-size: 22px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="auth/login.html" class="nav-icon">
            <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
        </a>
    </nav>

    <!-- Main -->
    <div class="dash-main">
        <div class="dash-container">

            <!-- Header -->
            <div class="editor-header">
                <div class="editor-header-left">
                    <div class="dash-greeting">
                        <a href="../dashboard/note_editor.html" class="back-btn">
                            <i class="bi bi-arrow-left"></i>
                            Note Editor
                        </a>
                    </div>
                    <div class="dash-title editor-title">Quiz Title</div>      
                </div>
            </div>

            <div class="dash-divider"></div>

            <!-- MCQ Questions -->
            <div class="quiz-active-layout">
                <div class="quiz-active-placeholder">
                    <div id="quiz-mcq-container"></div>
                </div>

                <!-- Questions list-->
                <div class="quiz-active-side">
                    <div class="editor-side-card quiz-question-list-card">
                        <div class="editor-side-label">Questions</div>
                        <div class="quiz-question-list" id="quiz-question-list"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="../../static/js/quiz.js"></script>
</body>
</html>
