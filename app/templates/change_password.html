<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notetella — Change Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>

</head>
<body class="dashboard-body">
  <!-- Main -->
    <div class="container">
    <div class="row justify-content-center">
      <div class="login-card col-9 col-sm-10 col-md-8">
        <button class="btn-create btn-back" id="back">←</button>
        <div class="mb-4">
          <img class="logo-img" src="../../assets/images/svg/notella_logo_plain.svg" alt="Notella logo"/>
        </div>
        <div class="welcome">Change Password</div>
        <div class="fields">
          <input class="field" type="password" placeholder="old password" autocomplete="off" id="old_pass"/>
          <input class="field" type="password" placeholder="new password" autocomplete="off" id="new_pass"/>
          <input class="field" type="password" placeholder="confirm new password" autocomplete="off" id="conf_new_pass"/>
        </div>
        <button class="btn-login" id="change_pass">enter</button>
      </div>
    </div>
  </div>

  <script>
    const change = document.getElementById("change_pass")
    const old = document.getElementById("old_pass")
    const new_pass = document.getElementById("new_pass")
    const conf = document.getElementById("conf_new_pass")
    change.addEventListener("click", function(){
      if(old.value === "" || new_pass.value === "" || conf === ""){
        alert("Please fill all column")
      }
      else{
        if(new_pass.value === conf.value){
            alert("successfully change password")
            window.location.href = "profile.html"
        }
        else{
            alert("password not matched")
            conf.value = ""
            conf.focus()
        }
      }
    })

    const back = document.getElementById("back")
    back.addEventListener('click', function(){
      window.location.href = "profile.html"
    })

    const inputs = [old, new_pass, conf]
      inputs.forEach(function(input, index){
        input.addEventListener('keydown', function(event){
          if(event.key === 'Enter'){
            if(index < inputs.length - 1){
              inputs[index + 1].focus()
            } else {
              change.click()
            }
          }
        })
      })
  </script>
</body>
</html>
