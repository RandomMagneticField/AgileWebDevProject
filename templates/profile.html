<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notetella — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/main.css"/>

  <style>
  .header{
    display: flex;
    align-items: center;
    margin-bottom: 16px;
    }

    .setting{
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: var(--btn-login-bg);
        border: 1px solid white;
    }

    .setting:hover{
        background-color: var(--btn-login-hover);
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .settings-label {
        font-size: 14px;
        font-weight: 100;
        color: var(--text-muted);
    }
    
    .settings-value {
        font-size: 14px;
        font-weight: 100;
        color: var(--text-primary);
    }

    .section-title {
        font-size: 16px;
        font-weight: 400;
        color: var(--text-primary);
        margin-bottom: 8px;
        margin-top: 16px;
    }

    .section{
        width: auto;
        height: auto;
    }

    .largebox{
        border: 1px solid var(--card-border);
        width: auto;
        height:auto;
        border-radius: 15px;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .smallboxes{
        display: flex;
        gap: 10px;
    }

    .smallbox{
        border: 1px solid var(--card-border);
        width: 228px;
        height: 144px;
        border-radius: 20px;
        padding: 6px;
        text-align: center;
    }
        
    .transparent{
        font-size: 14px;
        color: var(--text-muted);
        padding: 0px;
    }

    .num{
        font-size: 40px;
        color: var(--text-primary);
        padding: 0px;
    }

    .btn-back {
      width: auto !important;
      padding: 8px 16px !important;
      font-size: 13px !important;
      align-self: flex-start;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 52px;
      height: 32px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--btn-login-bg);
      border-radius: 999px;
      cursor: pointer;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 4px;
      top: 4px;
      background-color: #ffffff;
      border-radius: 50%;
    }
    .switch input:checked + .slider { background-color: #01065f; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    </style>
</head>
<body class="dashboard-body">

  <!-- Sidebar -->
    <nav class="sidebar">
        <a href="dashboard/index.html"class="nav-icon" >
            <i class="bi bi-house" style="font-size: 20px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="info.html" class="nav-icon">
            <i class="bi bi-info" style="font-size: 25px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="discover/index.html" class="nav-icon">
            <i class="bi bi-search" style="font-size: 18px;"></i>
        </a>
        <div class="sidebar-divider" ></div>
        <a href="profile.html" class="nav-icon active">
            <i class="bi bi-person" style="font-size: 22px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="auth/login.html" class="nav-icon">
            <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
        </a>
    </nav>

  <!-- Main -->
    <div class="dash-main">
        <div class="dash-container">
            <div class="header">
                <div class="header-left"></div>
                <div class="header-middle">Notella.</div>
            </div>
            
            <hr>

            <!-- Account -->
            <p class="section-title">Account</p>
            <div class="settings-row">
                <span class="settings-label">username</span>
                <span class="settings-value">user1</span>
            </div>
            <div class="settings-row">
                <span class="settings-label">email</span>
                <span class="settings-value">user1@gmail.com</span>
            </div>
            <div class="settings-row">
                <span class="settings-label">password</span>
                <span class="settings-value">••••••••</span>
            </div>

            <hr>

            <!--Overview-->
            <div class="largebox">
                <p style="color: var(--text-primary); margin-bottom: 10px;">Overview</p>
                <div class="smallboxes">
                    <div class="smallbox">
                        <p class="transparent">Notes</p>
                        <p class="num">27</p>
                        <p class="transparent">5 public</p>
                    </div>
                    <div class="smallbox">
                        <p class="transparent">Decks</p>
                        <p class="num">40</p>
                        <p class="transparent">18 public</p>
                    </div>
                    <div class="smallbox">
                        <p class="transparent">Total Quizzes</p>
                        <p class="num">38</p>
                        <p class="transparent">past month</p>
                    </div>
                    <div class="smallbox">
                        <p class="transparent">Avg. Quiz Score</p>
                        <p class="num">78%</p>
                        <p class="transparent">across all notes</p>
                    </div>
                </div>
            </div>

            <!-- Preferences -->
            <p class="section-title">Preference</p>
            <div class="settings-row">
                <span class="settings-label">dark mode</span>
                <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
            </div>
        </div>
    </div>

    <script>
        const setting = document.getElementById("setting")

        setting.addEventListener('click', function(){
            window.location.href="setting.html"
        })
    </script>
</body>
</html>
