<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notetella — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../static/css/main.css"/>

  <style>

        .header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-left {
            flex: 1;
        }

        .header-middle {
            flex: 1;
            text-align: center;
        }

        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .setting{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--btn-login-bg);
            border: 1px solid white;
        }

        .setting:hover{
            background-color: var(--btn-login-hover);
        }

        .section{
            width: auto;
            height: auto;
        }

        .largebox{
            border: 1px solid var(--card-border);
            width: auto;
            height:auto;
            border-radius: 15px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .smallboxes{
            display: flex;
            gap: 10px;
        }

        .smallbox{
            border: 1px solid var(--card-border);
            width: 228px;
            height: 144px;
            border-radius: 20px;
            padding: 6px;
            text-align: center;
        }
        
        .transparent{
            font-size: 14px;
            color: var(--text-muted);
            padding: 0px;
        }

        .num{
            font-size: 40px;
            color: var(--text-primary);
            padding: 0px;
        }
    </style>
</head>
<body class="dashboard-body">

  <!-- Sidebar -->
    <nav class="sidebar">
        <a href="dashboard/index.html"class="nav-icon" >
            <i class="bi bi-house" style="font-size: 20px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="info.html" class="nav-icon">
            <i class="bi bi-info" style="font-size: 25px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="discover/index.html" class="nav-icon">
            <i class="bi bi-search" style="font-size: 18px;"></i>
        </a>
        <div class="sidebar-divider" ></div>
        <a href="profile.html" class="nav-icon active">
            <i class="bi bi-person" style="font-size: 22px;"></i>
        </a>
        <div class="sidebar-divider"></div>
        <a href="auth/login.html" class="nav-icon">
            <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
        </a>
    </nav>

  <!-- Main -->
    <div class="dash-main">
        <div class="dash-container">
            <div class="header">
                <div class="header-left"></div>
                <div class="header-middle">Notella.</div>
                <div class="header-right">
                    <button class="setting" id="setting">setting logo</button>
                </div>
            </div>
            
            <hr>

            <!--user profile info-->
            <div class="section">
                <p>name</p>
                <p>username</p>
                <div class="largebox">
                    <p>Hi, I'm a senior in UWA. I'm enrolled in biochem.</p>
                </div>
            </div>

            <hr>

            <!--Overview-->
            <div class="largebox">
                <p style="color: var(--text-primary); margin-bottom: 10px;">Overview</p>
                <div class="smallboxes">
                    <div class="smallbox">
                        <p class="transparent">Notes</p>
                        <p class="num">27</p>
                        <p class="transparent">5 public</p>
                    </div>
                    <div class="smallbox">
                        <p class="transparent">Decks</p>
                        <p class="num">40</p>
                        <p class="transparent">18 public</p>
                    </div>
                    <div class="smallbox">
                        <p class="transparent">Total Quizzes</p>
                        <p class="num">38</p>
                        <p class="transparent">past month</p>
                    </div>
                    <div class="smallbox">
                        <p class="transparent">Avg. Quiz Score</p>
                        <p class="num">78%</p>
                        <p class="transparent">across all notes</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const setting = document.getElementById("setting")

        setting.addEventListener('click', function(){
            window.location.href="setting.html"
        })
    </script>
</body>
</html>
