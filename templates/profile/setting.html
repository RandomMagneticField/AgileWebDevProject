<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notella – Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../static/css/main.css"/>

  <style>
    .settings-card {
      width: 550px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(10px);
    }

    .settings-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .settings-title {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 100;
      color: var(--text-primary);
    }

    .settings-divider {
      border: none;
      border-bottom: 1px solid var(--divider-line);
      margin: 16px -36px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .settings-label {
      font-size: 14px;
      font-weight: 100;
      color: var(--text-muted);
    }

    .settings-value {
      font-size: 14px;
      font-weight: 100;
      color: var(--text-primary);
    }

    .section-title {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--avatar-bg);
      flex-shrink: 0;
    }

    .profile-info {
      flex: 1;
      text-align: center;
    }

    .btn-back {
      width: auto !important;
      padding: 8px 16px !important;
      font-size: 13px !important;
      align-self: flex-start;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 52px;
      height: 32px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--btn-login-bg);
      border-radius: 999px;
      cursor: pointer;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 4px;
      top: 4px;
      background-color: #ffffff;
      border-radius: 50%;
    }
    .switch input:checked + .slider { background-color: #7B61FF; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
  </style>
</head>
<body>

  <div class="logo">Notella.</div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="settings-card">

        <!-- Header -->
        <div class="settings-header">
          <button class="btn-create btn-back" id="back">← back</button>
          <span class="settings-title">User settings</span>
        </div>
        <hr class="settings-divider">

        <!-- Profile -->
        <div class="settings-row">
          <div class="avatar"></div>
          <div class="profile-info">
            <p class="settings-value">user1</p>
            <p class="settings-label">member since Dec 2017</p>
          </div>
        </div>
        <hr class="settings-divider">

        <!-- Account -->
        <p class="section-title">Account</p>
        <div class="settings-row">
          <span class="settings-label">username</span>
          <span class="settings-value">user1</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">email</span>
          <span class="settings-value">user1@gmail.com</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">password</span>
          <span class="settings-value">••••••••</span>
        </div>
        <hr class="settings-divider">

        <!-- Preferences -->
        <p class="section-title">Preference</p>
        <div class="settings-row">
          <span class="settings-label">dark mode</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
        <hr class="settings-divider">

        <!-- Buttons -->
        <button class="btn-login" style="margin-top:16px;">Log Out</button>
        <button class="btn-create" style="margin-top:10px;">Delete Account</button>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('back').addEventListener('click', function(){
      window.location.href = 'login.html'
    })
  </script>

</body>
</html>
