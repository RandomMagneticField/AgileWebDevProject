<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notella - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../../static/css/main.css"/>
    <link rel="stylesheet" href="../../static/css/auth.css"/>

    <style>
      .login-card .btn-back {
          width: auto !important;
          padding: 8px 20px !important;
          font-size: 13px;
          align-self: flex-start;
          margin-bottom: 20px;
        }
    </style>
  </head>
  <body>

    <div class="logo">Notella</div>

    <div class="container">
      <div class="row justify-content-center">
        <div class="login-card col-9 col-sm-10 col-md-8">

          <button class="btn-create btn-back" id="back">← back to login</button>


          <div class="welcome">Create account</div>
          <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px;">
            Already have an account? <a href="login.html" style="color:var(--text-primary);">sign in</a>
          </p>

          <div class="fields">
            <input class="field" type="email" placeholder="email" id="email" autocomplete="off"/>
            <input class="field" type="text" placeholder="username" id="uname" autocomplete="off"/>
            <input class="field" type="password" placeholder="password" id="pass" autocomplete="off"/>
            <input class="field" type="password" placeholder="confirm password" id="confpass" autocomplete="off"/>
          </div>

          <button class="btn-login" id="signupbtn">Sign Up</button>

        </div>
      </div>
    </div>

    <script>
      const backbtn = document.getElementById("back")
      const email = document.getElementById("email")
      const un = document.getElementById("uname")
      const pw = document.getElementById("pass")
      const confpw = document.getElementById("confpass")
      const subtn = document.getElementById("signupbtn")

      backbtn.addEventListener('click', function(){
        window.location.href = 'login.html'
      })

      subtn.addEventListener('click', function(){
        if(email.value === '' || un.value === '' || pw.value === '' || confpw.value === ''){
          alert("Please fill in all fields")
        } else {
          if(pw.value === confpw.value){
            alert('Account created successfully!')
          } else {
            alert("Passwords don't match")
            confpw.value = ""
            confpw.focus()
          }
        }
      })

      const inputs = [email, un, pw, confpw]
      inputs.forEach(function(input, index){
        input.addEventListener('keydown', function(event){
          if(event.key === 'Enter'){
            if(index < inputs.length - 1){
              inputs[index + 1].focus()
            } else {
              subtn.click()
            }
          }
        })
      })
    </script>

  </body>
</html>
