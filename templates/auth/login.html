<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notetella</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../static/css/main.css"/>
</head>
<body>

  <div class="logo" aria-label="Notella logo">
    <img class="logo-img" src="../../assets/images/svg/notella_logo_plain.svg" alt="Notella logo"/>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="login-card col-9 col-sm-10 col-md-8">
        <div class="avatar"></div>
        <div class="welcome">Welcome</div>
        <div class="fields">
          <input class="field" type="text" placeholder="username" autocomplete="off"/>
          <input class="field" type="password" placeholder="password" autocomplete="off"/>
        </div>
        <button class="btn-login">Login</button>
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or</span>
          <div class="divider-line"></div>
        </div>
        <button class="btn-create">Create an Account</button>
      </div>
    </div>
  </div>

</body>
</html>
