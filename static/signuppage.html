<!DOCTYPE html>
<html>
    <head>
        <title>sign up page</title>
        <style>
            hr{
                border: none;
                border-bottom: 1px solid #FFFFFF;
                padding: 10px;
                margin-left: -2rem;
                margin-right: -2rem;
            }

            body{
                margin:0;
                background-color: #0E0E0E;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            h1{
                font-size: 48px;
                color: #FFFFFF;
            }
            p{
                font-size: 20px;
                color: #FFFFFF;
            }

            a{
                color: #4E4A4A;
            }

            .card{
                width: 500px;
                background-color: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 10px;
                padding: 2rem;
            }

            input{
                width: 100%;
                height: 75px;
                border: 1px solid #A0A0A0;
                border-radius: 50px;
                margin-bottom: 10px;
                background-color: #4E4A4A;
                color: #FFFFFF;
                text-align: center;
            }

            ::placeholder {
                font-size: 20px;
                color: rgba(255, 255, 255, 0.35);
            }

            .btn{
                font-size: 20px;
                background-color: #4E4A4A;
                color: #000000;
                width: 100%;
                height: 75px;
                border-radius: 50px;
                border: 1px solid #4E4A4A;
                cursor: pointer;
            }

            .btn:hover{
                background-color: #A0A0A0;
            }

            .back-btn{
                font-size: 20px;
                background-color: #4E4A4A;
                color: #000000;
                width: 50%;
                height: 75px;
                border-radius: 50px;
                border: 1px solid #4E4A4A;
                cursor: pointer;
                display: block;
            }
        </style>
    </head>
    <body>

        <!--create the border-->
        <div class="card">
            <!--create back to login button-->
            <button class="back-btn"> <- back to login</button>
            <hr> <!--create line-->
            <h1>Create account</h1>
            <p>Already have an account? <a href="link to login page">sign in</a></p>

            <!--create the input-->
            <div class="input-group">
                <input type="email" placeholder="email" id="email">
                <input type="text" placeholder="username" id="uname">
                <input type="password" placeholder="password" id="pass">
                <input type="password" placeholder="confirm password" id="confpass">
            </div>

            <!--create sign up button-->
            <button class="btn" id="signupbtn">Sign Up</button>
        </div>

        <script>
            const email = document.getElementById("email")
            const un = document.getElementById("uname")
            const pw = document.getElementById("pass")
            const confpw = document.getElementById("confpass")
            const subtn = document.getElementById("signupbtn")

            subtn.addEventListener('click', function(){
                //check if everything has been filled
                if(email.value === '' || un.value === '' || pw.value === '' || confpw.value === ''){
                    alert("Please fill in all fields")
                }
                else{
                    //check if password matched confirm password
                    if(pw.value === confpw.value){
                        alert('Account created successfully!')
                    }
                    else{
                        alert("Password doesn't matched")
                    }
                }
            })

            //automatically go to the nect one with enter
            const inputs = [email, un, pw, confpw]
            inputs.forEach(function(input, index){
                input.addEventListener('keydown', function(event){
                    if(event.key === 'Enter'){
                        if(index < inputs.length-1){
                            inputs[index+1].focus()
                        }
                        else{
                            subtn.click()
                        }
                    }
                })
            })
        </script>
    </body>
</html>
